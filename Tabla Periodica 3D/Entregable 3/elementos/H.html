<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Hidrógeno (H)</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f1117;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */
.sidebar{
width:300px;
background:linear-gradient(180deg, #161a22, #0f1117);
padding:20px;
box-shadow:2px 0 20px rgba(0,0,0,0.6);
overflow-y:auto;
display:flex;
flex-direction:column;
gap:20px;
}

/* TARJETA */
.card{
background:linear-gradient(135deg, #2fbf71, #1e9e5a);
border-radius:14px;
padding:20px;
text-align:center;
color:white;
box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

.card .num{
font-size:12px;
text-align:left;
opacity:0.7;
}

.card .sim{
font-size:48px;
font-weight:bold;
}

.card .name{
font-size:18px;
margin-top:5px;
}

/* SECCIONES */
.section{
background:#1c212b;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.section h3{
margin:0 0 10px;
font-size:14px;
color:#aaa;
text-transform:uppercase;
letter-spacing:1px;
}

.section p{
margin:6px 0;
font-size:13px;
}

/* BOTON */
.volver{
margin-top:auto;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg, #00aaff, #0066ff);
color:white;
font-size:14px;
font-weight:bold;
cursor:pointer;
transition:all 0.2s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.volver:hover{
transform:translateY(-2px);
box-shadow:0 6px 14px rgba(0,0,0,0.6);
}

.volver:active{
transform:scale(0.95);
}

/* AREA 3D */
#contenedor3D{
flex:1;
}

/* PANEL INFO */
.info-panel{
position:absolute;
bottom:20px;
left:320px;
background:#161a22;
padding:15px;
border-radius:10px;
font-size:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.dot{
display:inline-block;
width:10px;
height:10px;
border-radius:50%;
margin-right:6px;
}

.proton{background:#ff4444;}
.neutron{background:#aaaaaa;}
.electron{background:#44aaff;}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="card">
<div class="num">1</div>
<div class="sim">H</div>
<div class="name">Hidrógeno</div>
</div>

<div class="section">
<h3>Información básica</h3>
<p><b>Número atómico:</b> 1</p>
<p><b>Masa:</b> 1.008 u</p>
<p><b>Estado:</b> Gas</p>
</div>

<div class="section">
<h3>Clasificación</h3>
<p><b>Tipo:</b> No metal</p>
<p><b>Grupo:</b> 1</p>
<p><b>Periodo:</b> 1</p>
</div>

<div class="section">
<h3>Configuración</h3>
<p>1s¹</p>
</div>

<div class="section">
<h3>Descripción</h3>
<p>El elemento más ligero y abundante del universo.</p>
</div>

<button class="volver" onclick="window.location.href='../index.html'">
⬅ Volver a la tabla
</button>

</div>

<!-- 3D -->
<div id="contenedor3D"></div>

<!-- PANEL -->
<div class="info-panel">
<h3>Partículas</h3>
<div><span class="dot proton"></span> Protones: 1</div>
<div><span class="dot neutron"></span> Neutrones: 0</div>
<div><span class="dot electron"></span> Electrones: 1</div>

<h3>Orbitales</h3>
<div>🟡 s → esfera</div>
</div>

<!-- THREE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// ESCENA
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1117);

// CAMARA
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 6;

// RENDER
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth - 300, window.innerHeight);
document.getElementById("contenedor3D").appendChild(renderer.domElement);

// CONTROLES
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// LUZ
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(10,10,10);
scene.add(light);

// GRUPO
const atom = new THREE.Group();
scene.add(atom);

// NUCLEO
const nucleus = new THREE.Group();
atom.add(nucleus);

function part(color){
return new THREE.Mesh(
new THREE.SphereGeometry(0.2, 16, 16),
new THREE.MeshStandardMaterial({ color })
);
}

// PROTON
let proton = part(0xff4444);
proton.position.set(0,0,0);
nucleus.add(proton);

// ELECTRON (nube simple)
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(800 * 3);

for(let i=0;i<800;i++){
let r = Math.random()*2;
let theta = Math.random()*Math.PI*2;
let phi = Math.acos((Math.random()*2)-1);

positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
positions[i*3+2] = r * Math.cos(phi);
}

geometry.setAttribute('position', new THREE.BufferAttribute(positions,3));

const material = new THREE.PointsMaterial({
color:0x44aaff,
size:0.05,
transparent:true,
opacity:0.6
});

const nube = new THREE.Points(geometry, material);
atom.add(nube);

// ORBITAL S
const orbitalS = new THREE.Mesh(
new THREE.SphereGeometry(2,32,32),
new THREE.MeshBasicMaterial({color:0xffff00,wireframe:true,transparent:true,opacity:0.2})
);
atom.add(orbitalS);

// ANIMACION
function animate(){
requestAnimationFrame(animate);
atom.rotation.y += 0.003;
controls.update();
renderer.render(scene, camera);
}
animate();

// RESPONSIVE
window.addEventListener("resize", () => {
camera.aspect = (window.innerWidth - 300) / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth - 300, window.innerHeight);
});
</script>

</body>
</html>
